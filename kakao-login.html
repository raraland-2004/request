<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>카카오 로그인 - 데일리퀘스트</title>
<style>
*{box-sizing:border-box;font-family:'Apple SD Gothic Neo',sans-serif;}
body{margin:0;background:#FEE500;display:flex;justify-content:center;align-items:center;min-height:100vh;}
.box{background:white;border-radius:24px;padding:32px 24px;max-width:360px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.15);}
h2{font-size:22px;margin-bottom:8px;}
p{color:#888;font-size:14px;margin-bottom:24px;}
.kakao-btn{background:#FEE500;border:none;border-radius:14px;padding:16px;width:100%;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.kakao-btn:hover{background:#FFD700;}
.success{background:#F0FFF4;border-radius:14px;padding:16px;margin-top:16px;text-align:left;}
.token-box{background:#f5f5f5;border-radius:10px;padding:12px;font-size:11px;word-break:break-all;margin:8px 0;max-height:80px;overflow:auto;}
.copy-btn{background:linear-gradient(135deg,#C44EFF,#FF6B9D);color:white;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.status{margin-top:12px;font-size:13px;color:#666;}
</style>
</head>
<body>
<div class="box">
  <div style="font-size:48px;margin-bottom:8px;">🎮</div>
  <h2>데일리 퀘스트</h2>
  <p>카카오 로그인으로 매일 저녁<br>퀘스트 결과를 카톡으로 받아요!</p>

  <div id="login-area">
    <button class="kakao-btn" onclick="kakaoLogin()">
      <span style="font-size:20px;">💬</span>
      카카오 로그인
    </button>
  </div>

  <div id="success-area" style="display:none">
    <div class="success">
      <div style="font-weight:700;color:#2E7D32;margin-bottom:8px;">✅ 로그인 성공!</div>
      <div style="font-size:12px;color:#555;margin-bottom:4px;">📋 액세스 토큰:</div>
      <div class="token-box" id="access-token"></div>
      <button class="copy-btn" onclick="copyAccess()">액세스 토큰 복사</button>
      <div style="font-size:12px;color:#555;margin:8px 0 4px;">📋 리프레시 토큰:</div>
      <div class="token-box" id="refresh-token"></div>
      <button class="copy-btn" onclick="copyRefresh()">리프레시 토큰 복사</button>
    </div>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const REST_API_KEY = '7baa4386e5393747c7969595e81e97fd';
const CLIENT_SECRET = 'WwDh4YNWrKI1L6K2q7ovEnuD0n6CvoCR';
const REDIRECT_URI = 'https://raraland-2004.github.io/request/kakao-login.html';

// 페이지 로드시 code 파라미터 확인
window.onload = async function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.getElementById('status').textContent = '⏳ 토큰 발급 중...';
    await getToken(code);
  }
};

function kakaoLogin() {
  const url = `https://kauth.kakao.com/oauth/authorize?client_id=${REST_API_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=talk_message`;
  window.location.href = url;
}

async function getToken(code) {
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    client_id: REST_API_KEY,
    client_secret: CLIENT_SECRET,
    redirect_uri: REDIRECT_URI,
    code: code,
  });

  try {
    const res = await fetch('https://kauth.kakao.com/oauth/token', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: body.toString()
    });
    const data = await res.json();

    if (data.access_token) {
      document.getElementById('login-area').style.display = 'none';
      document.getElementById('success-area').style.display = 'block';
      document.getElementById('access-token').textContent = data.access_token;
      document.getElementById('refresh-token').textContent = data.refresh_token;
      document.getElementById('status').textContent = '이 토큰을 Claude에게 보내주세요!';
      // localStorage에도 저장
      localStorage.setItem('kakao_access_token', data.access_token);
      localStorage.setItem('kakao_refresh_token', data.refresh_token);
    } else {
      document.getElementById('status').textContent = '❌ 오류: ' + JSON.stringify(data);
    }
  } catch(e) {
    document.getElementById('status').textContent = '❌ 오류: ' + e.message;
  }
}

function copyAccess() {
  const t = document.getElementById('access-token').textContent;
  navigator.clipboard.writeText(t);
  alert('액세스 토큰 복사됐어요! Claude에게 붙여넣기 해주세요 😊');
}
function copyRefresh() {
  const t = document.getElementById('refresh-token').textContent;
  navigator.clipboard.writeText(t);
  alert('리프레시 토큰 복사됐어요! Claude에게 붙여넣기 해주세요 😊');
}
</script>
</body>
</html>
